{% extends "base.html" %} {% block title %} | AI Assistant{% endblock %} {%
block content %}

<style>
  /* Markdown content styling inside chat bubbles */
  .chat-markdown p { margin: 0 0 0.5rem 0; }
  .chat-markdown p:last-child { margin-bottom: 0; }
  .chat-markdown h1, .chat-markdown h2, .chat-markdown h3,
  .chat-markdown h4, .chat-markdown h5, .chat-markdown h6 {
    margin: 0.75rem 0 0.4rem 0;
    font-weight: 600;
    line-height: 1.3;
  }
  .chat-markdown h1 { font-size: 1.25rem; }
  .chat-markdown h2 { font-size: 1.15rem; }
  .chat-markdown h3 { font-size: 1.05rem; }
  .chat-markdown ul, .chat-markdown ol {
    margin: 0.25rem 0 0.5rem 0;
    padding-left: 1.4rem;
  }
  .chat-markdown li { margin-bottom: 0.2rem; }
  .chat-markdown code {
    background: rgba(0,0,0,0.06);
    padding: 0.15rem 0.35rem;
    border-radius: 4px;
    font-size: 0.88em;
    font-family: 'Fira Code', 'Consolas', monospace;
  }
  .chat-markdown pre {
    background: #1e1e2e;
    color: #cdd6f4;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    overflow-x: auto;
    margin: 0.5rem 0;
    font-size: 0.85em;
  }
  .chat-markdown pre code {
    background: none;
    padding: 0;
    color: inherit;
  }
  .chat-markdown blockquote {
    border-left: 3px solid var(--bs-primary, #6366f1);
    margin: 0.5rem 0;
    padding: 0.25rem 0.75rem;
    color: #555;
  }
  .chat-markdown table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.5rem 0;
    font-size: 0.9em;
  }
  .chat-markdown th, .chat-markdown td {
    border: 1px solid #dee2e6;
    padding: 0.35rem 0.6rem;
    text-align: left;
  }
  .chat-markdown th { background: rgba(0,0,0,0.04); font-weight: 600; }
  .chat-markdown hr { margin: 0.75rem 0; border-color: #dee2e6; }
  .chat-markdown strong { font-weight: 600; }

  /* Typing animation */
  .typing-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }
</style>

<div
  class="row min-vh-100 flex-column align-items-center justify-content-center p-4"
>
  <div class="col-md-8 col-lg-6">
    <div
      class="card shadow-sm border-0 h-100"
      style="min-height: 60vh; display: flex; flex-direction: column"
    >
      <div
        class="card-header bg-white border-bottom py-3 d-flex align-items-center"
      >
        <i class="bi bi-robot fs-4 text-primary me-2"></i>
        <h5 class="mb-0">AI Assistant</h5>
        <span class="badge bg-success ms-auto d-flex align-items-center gap-1">
          <i class="bi bi-circle-fill" style="font-size: 0.5rem"></i>
          Local Model
        </span>
      </div>

      <div
        class="card-body bg-light flex-grow-1 overflow-auto p-4"
        id="chatWindow"
        style="max-height: 60vh"
      >
        <!-- Chat messages will be appended here -->
        <div class="d-flex mb-3">
          <div
            class="bg-white p-3 rounded-3 shadow-sm text-dark me-auto"
            style="max-width: 80%"
          >
            Hello! I am your AI assistant, running locally on your machine. How can I help you today?
          </div>
        </div>
      </div>

      <div class="card-footer bg-white border-top p-3">
        <form id="chatForm" class="d-flex gap-2">
          <input
            type="text"
            id="userInput"
            class="form-control rounded-pill"
            placeholder="Ask a question..."
            autocomplete="off"
            required
          />
          <button
            type="submit"
            class="btn btn-primary rounded-circle"
            style="width: 44px; height: 44px; padding: 0"
          >
            <i class="bi bi-send-fill mt-1"></i>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Markdown parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- HTML sanitizer to prevent XSS -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const chatForm = document.getElementById("chatForm");
    const userInput = document.getElementById("userInput");
    const chatWindow = document.getElementById("chatWindow");

    // Configure marked for clean output
    marked.setOptions({
      breaks: true,
      gfm: true,
    });

    // Maintain conversation history for context
    const chatHistory = [];

    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const message = userInput.value.trim();
      if (!message) return;

      // Add user message to UI
      appendMessage(message, "user");
      userInput.value = "";
      userInput.disabled = true;

      // Show typing indicator
      const typingId = "typing-" + Date.now();
      appendMessage("Thinking", "assistant", typingId, false, true);

      try {
        const response = await fetch('{{ url_for("chatbot.send_message") }}', {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token() }}",
          },
          body: JSON.stringify({
            message: message,
            history: chatHistory,
          }),
        });

        const data = await response.json();

        // Remove typing indicator
        const typingEl = document.getElementById(typingId);
        if (typingEl) typingEl.remove();

        if (response.ok) {
          appendMessage(data.text, "assistant");
          // Store in history for multi-turn conversation
          chatHistory.push({ role: "user", content: message });
          chatHistory.push({ role: "assistant", content: data.text });

          // Keep history manageable (last 20 messages)
          if (chatHistory.length > 20) {
            chatHistory.splice(0, 2);
          }
        } else {
          appendMessage(
            data.error || "An error occurred.",
            "assistant",
            null,
            true,
          );
        }
      } catch (error) {
        console.error("Error:", error);
        const typingEl = document.getElementById(typingId);
        if (typingEl) typingEl.remove();
        appendMessage(
          "Failed to connect to the AI model. Make sure Docker Model Runner is running.",
          "assistant",
          null,
          true,
        );
      } finally {
        userInput.disabled = false;
        userInput.focus();
      }
    });

    function appendMessage(text, sender, id = null, isError = false, isTyping = false) {
      const msgDiv = document.createElement("div");
      msgDiv.className = `d-flex mb-3 ${sender === "user" ? "justify-content-end" : ""}`;
      if (id) msgDiv.id = id;

      const bubble = document.createElement("div");

      if (sender === "user") {
        bubble.className =
          "bg-primary text-white p-3 rounded-3 shadow-sm ms-auto";
        bubble.style.maxWidth = "80%";
        bubble.textContent = text;
      } else {
        bubble.className = `bg-white p-3 rounded-3 shadow-sm text-dark me-auto ${isError ? "border border-danger" : ""}`;
        bubble.style.maxWidth = "80%";

        if (isTyping) {
          // Animated typing indicator
          bubble.innerHTML = '<span class="typing-dots">' + text + '</span>';
        } else {
          // Parse markdown and sanitize for assistant messages
          const rawHtml = marked.parse(text);
          const cleanHtml = DOMPurify.sanitize(rawHtml);
          bubble.innerHTML = '<div class="chat-markdown">' + cleanHtml + '</div>';
        }
      }

      msgDiv.appendChild(bubble);
      chatWindow.appendChild(msgDiv);

      // Auto-scroll to bottom
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }
  });
</script>
{% endblock %}
